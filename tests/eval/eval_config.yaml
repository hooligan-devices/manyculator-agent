metrics_to_run:
  - calculator_completeness
  - parameter_consistency
  - rejection_accuracy

custom_metrics:
  - name: calculator_completeness
    prompt_template: |
      You are evaluating whether an AI calculator-generation agent successfully produced all required artifacts for a working calculator.

      A complete calculator generation MUST include ALL of the following in the agent's final response or trace:
      1. A `calculator_id` (UUID string) confirming the calculator was persisted
      2. A generated Python calculation script (visible in the trace inside `script_generator_output.script_content` with a `calculate(inputs)` function)
      3. A UI schema with input and output components (visible in the trace inside the `a2ui_schema` list)
      4. A user-facing description of what the calculator does (usually found in `blueprint.calculator_description` or a Text component in `a2ui_schema`)

      If the user's prompt was NOT a calculator request (e.g., "tell me a joke", "what's the weather"), the agent should have correctly rejected it. In that case, score 5 if rejection was clean and clear, score 1 if the agent tried to generate a calculator anyway.

      ### Evaluation Target:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as valid JSON:
      {
        "score": <1-5>,
        "explanation": "<detailed rationale>"
      }

      Scoring guide:
      5: All 4 artifacts present AND calculator_id returned (or correct rejection for non-calculator prompts)
      4: 3 of 4 artifacts present, minor gaps
      3: Core script generated but missing UI schema or description
      2: Only partial generation, major artifacts missing
      1: Complete failure — no calculator produced (or incorrectly attempted for non-calculator prompt)

  - name: parameter_consistency
    custom_function: |
      import json
      import re

      def evaluate(instance):
          """Check if parameter names are consistent across the agent trace.

          Extracts parameter names from the final CalculatorWorkflowState blueprint,
          then checks if the script and UI schema used the same exact names.
          """
          agent_data = instance.get("agent_data", {})
          events = agent_data.get("events", [])
          if not events:
              return {"score": 1.0, "explanation": "No events found (likely a rejection)."}
          
          # Find the latest event that has state attached
          final_state = {}
          for e in reversed(events):
              state = e.get("state", {})
              if state and isinstance(state, dict):
                  final_state = state
                  if "blueprint" in state:
                      break

          blueprint = final_state.get("blueprint", {})
          if not blueprint or not blueprint.get("is_calculator"):
               return {"score": 1.0, "explanation": "Not a calculator request, skip consistency."}
               
          parameters = blueprint.get("parameters", [])
          if not parameters:
              return {"score": 1.0, "explanation": "No parameters required by blueprint."}
              
          intent_params = {p.get("name") for p in parameters if p.get("name")}
          if not intent_params:
               return {"score": 0.5, "explanation": "Failed to parse parameters from blueprint."}
               
          script_output = final_state.get("script_generator_output", {})
          script_content = script_output.get("script_content", "") if isinstance(script_output, dict) else str(script_output)
          a2ui_schema_str = json.dumps(final_state.get("a2ui_schema", []))
          
          found_count = 0
          for param in intent_params:
              if param in script_content and param in a2ui_schema_str:
                  found_count += 1
                  
          ratio = found_count / len(intent_params)
          return {
              "score": ratio,
              "explanation": f"Found {found_count}/{len(intent_params)} parameters consistently in script and UI. Expected params: {intent_params}"
          }

  - name: rejection_accuracy
    prompt_template: |
      You are evaluating whether an AI calculator-generation agent correctly handled a user request that may or may not be a valid calculator request.

      VALID calculator requests: "Create a tip calculator", "Build a BMI calculator", "Make a kg to pounds converter", etc.
      INVALID (should be rejected): "What's the weather?", "Tell me a joke", "Explain quantum physics", general chat, etc.

      ### Evaluation Target:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your evaluation as valid JSON:
      {
        "score": <1-5>,
        "explanation": "<detailed rationale>"
      }

      Scoring guide:
      5: Correct classification — valid calculator requests produced a calculator, invalid requests were rejected
      4: Correct classification but response could be clearer
      3: Ambiguous handling
      2: Partially wrong classification
      1: Completely wrong — rejected a valid calculator request, or tried to generate for a non-calculator prompt
